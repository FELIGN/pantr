target-version = "py310"
line-length = 100

[lint]
select = [
  "E",
  "F",
  "I",
  "UP",
  "D",
  "ANN",
  "B",
  "C4",
  "NPY",
  "PD",
  "PIE",
  "PL",
  "Q",
  "RUF",
  "SIM",
]
ignore = ["D104"]

[lint.pydocstyle]
convention = "google"

[lint.per-file-ignores]
"src/**/*.py" = ["ANN101"]
"tests/**/*.py" = [
  "D100",
  "D101",
  "D102",
  "D103",
  "D104",
  "D105",
  "ANN401",
  "ANN101",
  "PLR2004",
]
"docs/**/*.py" = ["D100", "D101", "D102", "D103", "D104", "D105"]
# Tutorials are standalone teaching scripts (sphinx-gallery sources): keep real checks
# (imports, bugs, numpy) but drop library-grade docstring/annotation/magic-value rules.
# D205/D212/D415 are dropped because a gallery script's module docstring is a reST
# title block ("Title\n=====\n\n..."), not a one-line-summary API docstring.
"tutorials/**/*.py" = ["D101", "D102", "D103", "D105", "D205", "D212", "D415", "ANN", "PLR2004"]
