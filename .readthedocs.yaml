# Read the Docs build configuration for PaNTr.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    # The Sphinx-Gallery build renders the demos with PyVista on a headless
    # builder. Swap the regular vtk wheel (pulled in via pyvista) for the
    # OSMesa software-rendering build so off-screen rendering works without a
    # GPU or X server.
    post_install:
      - pip uninstall --yes vtk
      - pip install "vtk-osmesa>=9.3,<9.5"

sphinx:
  configuration: docs/conf.py
  # Match the CI docs build (`-W`): treat warnings as errors.
  fail_on_warning: true

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
