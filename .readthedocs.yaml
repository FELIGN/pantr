# Read the Docs build configuration for PaNTr.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  # The Sphinx-Gallery build renders the demos with PyVista on a headless
  # builder. Use the OSMesa software-GL build of vtk (no GPU/X server); it loads
  # the system libOSMesa provided by libosmesa6.
  apt_packages:
    - libgl1
    - libosmesa6
  jobs:
    # Replace the regular vtk wheel (pulled in via pyvista) with the matching
    # OSMesa build from Kitware's wheel index (vtk-osmesa is not on PyPI). Guard
    # makes it idempotent: skip when a cached env already has vtk-osmesa.
    post_install:
      - if pip show vtk >/dev/null 2>&1; then VER=$(pip show vtk | sed -n 's/^Version: //p'); pip uninstall --yes vtk; pip install --extra-index-url https://wheels.vtk.org "vtk-osmesa==$VER"; fi

sphinx:
  configuration: docs/conf.py
  # Match the CI docs build (`-W`): treat warnings as errors.
  fail_on_warning: true

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
