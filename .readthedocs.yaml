# Read the Docs build configuration for PaNTr.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    # The Sphinx-Gallery build renders the demos with PyVista on a headless
    # builder. Replace the regular vtk wheel (pulled in via pyvista) with the
    # matching OSMesa software-rendering build so off-screen rendering works
    # without a GPU or X server. vtk-osmesa is published on Kitware's wheel
    # index (not PyPI); pin it to the exact vtk version pyvista resolved.
    post_install:
      - VER=$(pip show vtk | sed -n 's/^Version: //p') && pip uninstall --yes vtk && pip install --extra-index-url https://wheels.vtk.org "vtk-osmesa==$VER"

sphinx:
  configuration: docs/conf.py
  # Match the CI docs build (`-W`): treat warnings as errors.
  fail_on_warning: true

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
