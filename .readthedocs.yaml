# Read the Docs build configuration for PaNTr.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  # The Sphinx-Gallery build renders the demos with PyVista on a headless
  # builder. docs/conf.py starts a virtual X display (Xvfb); VTK renders through
  # Mesa's software GL driver. Install both (the regular vtk wheel is kept).
  apt_packages:
    - xvfb
    - libgl1
    - libglx-mesa0
    - libgl1-mesa-dri

sphinx:
  configuration: docs/conf.py
  # Match the CI docs build (`-W`): treat warnings as errors.
  fail_on_warning: true

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
